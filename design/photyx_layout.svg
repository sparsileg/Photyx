<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;font-family:monospace">
  <title>Photyx UI Layout</title>
  <desc>Annotated wireframe of the Photyx application window layout</desc>

  <style>
    .label { font-size: 11px; fill: #1D9E75; font-family: monospace; }
    .dim   { font-size: 10px; fill: #888780; font-family: monospace; }
    .dim9  { font-size: 9px;  fill: #888780; font-family: monospace; }
  </style>

  <!-- Title bar -->
  <rect x="10" y="10" width="760" height="22" rx="6" fill="#111"/>
  <rect x="10" y="22" width="760" height="10" fill="#111"/>
  <text x="390" y="25" text-anchor="middle" class="dim">Photyx</text>
  <circle cx="30" cy="21" r="5" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>
  <circle cx="46" cy="21" r="5" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>
  <circle cx="62" cy="21" r="5" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>

  <!-- Menu bar -->
  <rect x="10" y="32" width="760" height="22" fill="#141414" stroke="#222" stroke-width="0.5"/>
  <text x="20"  y="47" class="dim">File</text>
  <text x="50"  y="47" class="dim">Edit</text>
  <text x="82"  y="47" class="dim">View</text>
  <text x="118" y="47" class="dim">Process</text>
  <text x="166" y="47" class="dim">Analyze</text>
  <text x="218" y="47" class="dim">Tools</text>
  <text x="255" y="47" class="dim">Help</text>
  <text x="530" y="47" class="label" text-anchor="middle">— Menu Bar —</text>

  <!-- Toolbar -->
  <rect x="10" y="54" width="760" height="28" fill="#181818" stroke="#222" stroke-width="0.5"/>
  <rect x="18"  y="59" width="44" height="17" rx="2" fill="#222" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="40"  y="71" text-anchor="middle" class="dim">Fit</text>
  <rect x="68"  y="59" width="32" height="17" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="84"  y="71" text-anchor="middle" class="dim">25%</text>
  <rect x="106" y="59" width="32" height="17" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="122" y="71" text-anchor="middle" class="dim">50%</text>
  <rect x="144" y="59" width="36" height="17" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="162" y="71" text-anchor="middle" class="dim">100%</text>
  <rect x="186" y="59" width="36" height="17" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="204" y="71" text-anchor="middle" class="dim">200%</text>
  <line x1="230" y1="58" x2="230" y2="82" stroke="#333" stroke-width="0.5"/>
  <rect x="238" y="59" width="52" height="17" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="264" y="71" text-anchor="middle" class="dim">Channel</text>
  <text x="530" y="71" class="label" text-anchor="middle">— Toolbar —</text>

  <!-- Quick Launch -->
  <rect x="10" y="82" width="760" height="26" fill="#141414" stroke="#222" stroke-width="0.5"/>
  <rect x="18"  y="87" width="60" height="15" rx="2" fill="#222" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="48"  y="98" text-anchor="middle" class="dim">List Files</text>
  <rect x="84"  y="87" width="50" height="15" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="109" y="98" text-anchor="middle" class="dim">FWHM</text>
  <rect x="140" y="87" width="60" height="15" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="170" y="98" text-anchor="middle" class="dim">Star Count</text>
  <rect x="206" y="87" width="50" height="15" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="231" y="98" text-anchor="middle" class="dim">List KW</text>
  <rect x="262" y="87" width="80" height="15" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
  <text x="302" y="98" text-anchor="middle" class="dim">AnalyzeFrames</text>
  <text x="580" y="98" class="label" text-anchor="middle">— Quick Launch —</text>

  <!-- Icon sidebar: y=108 to y=440, height=332 -->
  <rect x="10" y="108" width="28" height="332" fill="#111" stroke="#222" stroke-width="0.5"/>
  <text x="24" y="138" text-anchor="middle" class="dim" font-size="13">F</text>
  <text x="24" y="160" text-anchor="middle" class="dim" font-size="9">File</text>
  <text x="24" y="183" text-anchor="middle" class="dim" font-size="13">T</text>
  <text x="24" y="205" text-anchor="middle" class="dim" font-size="9">KW</text>
  <text x="24" y="228" text-anchor="middle" class="dim" font-size="13">{}</text>
  <text x="24" y="248" text-anchor="middle" class="dim" font-size="9">Macro</text>
  <text x="24" y="271" text-anchor="middle" class="dim" font-size="13">≡</text>
  <text x="24" y="291" text-anchor="middle" class="dim" font-size="9">Lib</text>
  <text x="24" y="314" text-anchor="middle" class="dim" font-size="13">P</text>
  <text x="24" y="334" text-anchor="middle" class="dim" font-size="9">Plug</text>

  <!-- Image viewer: x=38, y=108, width=732, height=332 -->
  <rect x="38" y="108" width="732" height="332" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Starfield dots -->
  <circle cx="100" cy="140" r="1"   fill="#1D9E75" opacity="0.4"/>
  <circle cx="210" cy="175" r="0.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="330" cy="155" r="1.2" fill="#1D9E75" opacity="0.5"/>
  <circle cx="450" cy="215" r="0.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="570" cy="180" r="1"   fill="#1D9E75" opacity="0.4"/>
  <circle cx="670" cy="220" r="0.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="140" cy="240" r="0.8" fill="#1D9E75" opacity="0.25"/>
  <circle cx="390" cy="260" r="1"   fill="#1D9E75" opacity="0.3"/>
  <circle cx="710" cy="165" r="0.8" fill="#1D9E75" opacity="0.35"/>
  <circle cx="250" cy="310" r="1"   fill="#1D9E75" opacity="0.3"/>
  <circle cx="590" cy="300" r="0.8" fill="#1D9E75" opacity="0.25"/>
  <circle cx="470" cy="345" r="1.2" fill="#1D9E75" opacity="0.4"/>
  <circle cx="740" cy="330" r="0.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="85"  cy="385" r="1"   fill="#1D9E75" opacity="0.25"/>
  <circle cx="630" cy="395" r="0.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="180" cy="405" r="1"   fill="#1D9E75" opacity="0.2"/>
  <circle cx="520" cy="415" r="0.8" fill="#1D9E75" opacity="0.25"/>
  <!-- Nebula suggestion -->
  <ellipse cx="404" cy="268" rx="130" ry="80" fill="#1D9E75" opacity="0.03"/>
  <ellipse cx="404" cy="268" rx="75"  ry="45" fill="#1D9E75" opacity="0.05"/>
  <text x="404" y="272" text-anchor="middle" class="label" font-size="14">Image Viewer</text>
  <text x="404" y="290" text-anchor="middle" class="dim">dominant — maximum available screen area</text>

  <!-- Console: x=38, y=440, width=240, height=96 -->
  <rect x="38"  y="440" width="240" height="96" fill="#0d0d0d" stroke="#222" stroke-width="0.5"/>
  <text x="44"  y="454" class="label" font-size="10">pcode console  (~1/3 width)</text>
  <text x="44"  y="468" class="dim9">&gt; ReadAllFITFiles</text>
  <text x="44"  y="481" fill="#1D9E75" font-size="9" font-family="monospace">&gt; AnalyzeFrames</text>
  <text x="44"  y="494" class="dim9">64 frames. 3 REJECT, 7 SUSPECT.</text>
  <text x="44"  y="509" class="dim9">&gt; _</text>
  <line x1="278" y1="440" x2="278" y2="536" stroke="#333" stroke-width="0.5"/>

  <!-- Info panel: x=278, y=440, width=492, height=96 -->
  <rect x="278" y="440" width="492" height="96" fill="#0d0d0d" stroke="#222" stroke-width="0.5"/>
  <text x="284" y="454" class="label" font-size="10">Info Panel  (~2/3 width)</text>
  <text x="284" y="468" class="dim9">X: 1482  Y: 2041  Raw: 0.6471  Val: 42381</text>
  <text x="284" y="481" class="dim9">OBJECT: M31   EXPTIME: 300.0   FILTER: Duo   GAIN: 100</text>
  <text x="284" y="494" class="dim9">FWHM: 2.34"   Ecc: 0.41   BG Median: 847   Stars: 312   PXFLAG: PASS</text>
  <text x="284" y="507" class="dim9">RA: 10.6848   DEC: 41.2692   Frame 2 of 64</text>

  <!-- Status bar: x=10, y=536, width=760, height=22 — flush to bottom border -->
  <rect x="10" y="536" width="760" height="22" fill="#111" stroke="#1D9E75" stroke-width="0.75"/>
  <text x="20"  y="551" class="dim9">Ready  |  64 files loaded  |  D:/Astrophotos/M31  |  Rig: EdgeHD8 + ASI2600  |  Theme: Matrix</text>
  <text x="762" y="551" text-anchor="end" class="dim9">Photyx</text>

  <!-- Window frame border — drawn last, on top of everything -->
  <rect x="10" y="10" width="760" height="548" rx="6" fill="none" stroke="#1D9E75" stroke-width="2"/>

  <!-- Caption -->
  <text x="390" y="576" text-anchor="middle" class="dim9">Photyx — UI Layout Reference  (Section 8.1)</text>
</svg>
